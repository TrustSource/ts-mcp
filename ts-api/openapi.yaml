            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'*'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,x-api-key,x-apikey,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        type: "mock"
        passthroughBehavior: "NEVER"
  /compliance/csaf/{csaf_key}/documents:
    get:
      operationId: getComplianceCsafDocuments
      x-amazon-apigateway-integration:
        type: "http_proxy"
        connectionId: "${stageVariables.vpcLinkId}"
        connectionType: "VPC_LINK"
        httpMethod: "GET"
        uri: "http://${stageVariables.url}/api/v1/csaf/{csaf_key}/documents"
        responses:
          default:
            statusCode: "200"
        requestParameters:
          integration.request.path.csaf_key: "method.request.path.csaf_key"
          integration.request.header.version: "'2'"
        passthroughBehavior: "when_no_match"
      tags:
        - CSAF
      summary: List accessible CSAF documents
      description: Returns metadata of the company's published CSAF documents whose TLP level is permitted by the supplied feed key.
      parameters:
        - name: csaf_key
          in: path
          description: CSAF feed access key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      operationId: optionsComplianceCsafDocuments
      parameters:
        - name: csaf_key
          in: path
          description: CSAF feed access key
          required: true
