  /compliance/check/license:
    post:
      operationId: postComplianceCheckLicense
      parameters:
        - name: x-api-key
          in: header
          required: true
          schema:
            type: string
      security:
        - api_key: [ ]
      x-amazon-apigateway-integration:
        type: "http_proxy"
        connectionId: "${stageVariables.vpcLinkId}"
        connectionType: "VPC_LINK"
        httpMethod: "POST"
        uri: "http://${stageVariables.url}/api/v1/check_license"
        responses:
          default:
            statusCode: "200"
        requestParameters:
          integration.request.header.X-APIKEY: "method.request.header.x-api-key"
          integration.request.header.version: "'2'"
        passthroughBehavior: "when_no_match"
      tags:
        - Check
      summary: Check license compliance
      description: Evaluates whether a license is compliant in the context of a given project and module. Typically called by IDE plugins and build tool integrations.
      requestBody:
        description: Check request params
        content:
          application/json:
            schema:
              title: RequestBodyCheckLicense
              required:
                - licenses
                - moduleName
                - projectName
              type: object
              properties:
                projectName:
                  type: string
                moduleName:
                  type: string
                licenses:
                  type: array
                  items:
                    type: string
        required: true
      responses:
        '200':
          description: Check request was successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Generic200'
        '400':
          description: Bad Request, data validation not successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-codegen-request-body-name: body
    options:
      operationId: optionsComplianceCheckLicense
      x-swagger-router-ignore: true
      tags:
        - Check
      responses:
        "200":
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
            Access-Control-Allow-Methods:
              schema:
                type: string
            Access-Control-Allow-Headers:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Empty"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
