          integration.request.header.version: "'2'"
        passthroughBehavior: "when_no_match"
      tags:
        - CSAF
      summary: Get a CSAF document
      description: Returns the full CSAF document if its TLP level is permitted by the supplied feed key.
      parameters:
        - name: csaf_key
          in: path
          description: CSAF feed access key
          required: true
          schema:
            type: string
        - name: document_id
          in: path
          description: CSAF document identifier
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
