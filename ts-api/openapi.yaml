            statusCode: "200"
        requestParameters:
          integration.request.path.release_key: "method.request.path.release_key"
          integration.request.header.version: "'2'"
        passthroughBehavior: "when_no_match"
      tags:
        - Releases
      summary: Get release CSAF/VEX changes
      description: Returns the latest changes to the CSAF/VEX advisory for a published release.
      parameters:
        - name: release_key
          in: path
          description: Published release key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                title: public-CSAF_VEX_CHANGES
                type: object
                required:
                  - vulnerabilities
                  - signatures
                properties:
                  document:
                    type: object
                    description: CSAF 2.0 document metadata (see OASIS CSAF standard)
                    additionalProperties: true
                  product_tree:
                    type: object
                    description: CSAF 2.0 document metadata (see OASIS CSAF standard)
                    additionalProperties: true
                  vulnerabilities:
                    type: array
                    items:
                      type: object
                      description: CSAF 2.0 vulnerability entry (see OASIS CSAF standard)
                      additionalProperties: true
                  signatures:
                    type: array
                    items:
                      type: object
                      description: Cryptographic signature for content verification
                      additionalProperties: true
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      operationId: optionsComplianceReleasesCsafChanges
      parameters:
        - name: release_key
          in: path
