        type: "http_proxy"
        connectionId: "${stageVariables.vpcLinkId}"
        connectionType: "VPC_LINK"
        httpMethod: "POST"
        uri: "http://${stageVariables.url}/api/v1/tests/sarif"
        responses:
          default:
            statusCode: "200"
        requestParameters:
          integration.request.header.X-APIKEY: "method.request.header.x-api-key"
          integration.request.header.version: "'2'"
        passthroughBehavior: "when_no_match"
      tags:
        - Tests
      summary: Import SARIF test results (JSON body)
      description: |
        Imports test results from a SARIF JSON document provided as a request body.
        The target module is resolved from one of the following (in order of preference):
        `moduleId`, `analysisId`, `scanId`, or the pair `projectName` + `moduleName`.
        When `projectName` + `moduleName` is used, the project must already exist;
        the module is auto-created within the project if it does not exist.
        If only `moduleName` is supplied (no `projectName`), the API will try to find an
        existing module by name within the company and link the test to it; the module is
        NOT created in that case. If multiple modules match, the first one is used — supply
        `projectName` to disambiguate. If no module matches, the test is imported unattached.
      parameters:
        - name: x-api-key
          in: header
          required: true
          schema:
            type: string
        - name: scanId
          in: query
          description: Scan id
          schema:
            type: string
        - name: analysisId
          in: query
          description: Analysis id
          schema:
            type: string
        - name: moduleId
          in: query
          description: Module id
          schema:
            type: string
        - name: projectName
          in: query
          description: Project name (alternative to moduleId/analysisId/scanId; pair with moduleName). Project must already exist.
          schema:
            type: string
        - name: moduleName
          in: query
          description: |
            Module name. When paired with `projectName`, the module is auto-created in that project
            if it does not exist. When supplied alone (no `projectName`), the API attempts to find
            an existing module by name within the company; if found, the test is linked to it
            (module is NOT created in this case). If no match exists, the test is imported unattached.
          schema:
            type: string
        - name: release
          in: query
          description: Specify release identifier
          schema:
            type: string
        - name: branch
          in: query
          description: Specify code branch
          schema:
            type: string
        - name: tag
          in: query
          description: Specify code tag
          schema:
            type: string
      requestBody:
        description: The information from SARIF, which should be transferred to TrustSource
