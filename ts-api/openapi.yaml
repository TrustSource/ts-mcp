openapi: 3.0.1
info:
  title: TrustSource Rest API
  description: >-
    This is the documentation of the TrustSource REST API.<br>
    Part of API calls require the header parameter <code>x-api-key</code>; an API key may be obtained from your company Scanners & API settings.<br><br>
    <b>Naming convention:</b> Path parameters use snake_case (e.g., <code>project_id</code>), query parameters use camelCase (e.g., <code>projectId</code>) for historical reasons.
  version: '2'
tags:
  - name: Account
    description: Authentication and authorization status
  - name: Releases
    description: Published compliance release documents (SBOM, Notice, CSAF/VEX)
  - name: Risks
    description: Risk management, assessment, and task tracking
  - name: Check
    description: License and component compliance checks
  - name: Approval
    description: Compliance approval workflow
  - name: Company
    description: Company FOSS compliance settings
  - name: Projects
    description: Project management and SBOM generation
  - name: Modules
    description: Module management, settings, and parts lists
  - name: Products
    description: Product management — create, read, update, and retire
  - name: Users
    description: User activity and API usage statistics
  - name: Scans
    description: Scan submission, processing, and results
  - name: Tests
    description: SARIF test result imports
  - name: Reports
    description: Compliance, vulnerability, and viability reports
  - name: DeepScan
    description: Repository deep scanning for license and security analysis
  - name: Vulnerabilities
    description: CVE/CWE vulnerability lookup and search
  - name: PSIRT
    description: Product Security Incident Response (CSAF advisories)
servers:
  - url: https://api.trustsource.io/v2
paths:
  /account/authorization:
    get:
      operationId: getAccountAuthorization
      parameters:
        - name: x-api-key
          in: header
          required: true
          schema:
            type: string
      security:
        - api_key: [ ]
      x-amazon-apigateway-integration:
        type: "http_proxy"
        connectionId: "${stageVariables.vpcLinkId}"
        connectionType: "VPC_LINK"
        httpMethod: "GET"
        uri: "http://${stageVariables.url}/api/v1/authorization"
        responses:
          default:
            statusCode: "200"
        requestParameters:
          integration.request.header.X-APIKEY: "method.request.header.x-api-key"
          integration.request.header.version: "'2'"
        passthroughBehavior: "when_no_match"
      tags:
        - Account
      summary: Get authorization status
      description: Returns the current authorization status for the provided API key.
      responses:
        '200':
          description: Authorization is ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Generic200'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      operationId: optionsAccountAuthorization
      x-swagger-router-ignore: true
      tags:
        - Account
      responses:
        "200":
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
            Access-Control-Allow-Methods:
              schema:
                type: string
            Access-Control-Allow-Headers:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Empty"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'*'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,x-api-key,x-apikey,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        type: "mock"
        passthroughBehavior: "NEVER"
  /compliance/releases/{release_key}/sbom:
    get:
      operationId: getComplianceReleasesSbom
      x-amazon-apigateway-integration:
        type: "http_proxy"
        connectionId: "${stageVariables.vpcLinkId}"
        connectionType: "VPC_LINK"
        httpMethod: "GET"
        uri: "http://${stageVariables.url}/api/v1/releases/{release_key}/sbom"
        responses:
          default:
            statusCode: "200"
        requestParameters:
          integration.request.path.release_key: "method.request.path.release_key"
          integration.request.header.version: "'2'"
        passthroughBehavior: "when_no_match"
      tags:
        - Releases
      summary: Get release SBOM
      description: Returns the full Software Bill of Materials for a published release, including component list and cryptographic signatures.
      parameters:
        - name: release_key
          in: path
          description: Published release key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                title: public-SBOM
                type: object
                required:
                  - components
                  - signatures
                properties:
                  components:
                    type: array
                    items:
                      $ref: '#/components/schemas/Component'
                  signatures:
                    type: array
                    items:
                      type: object
                      description: Cryptographic signature for content verification
                      additionalProperties: true
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      operationId: optionsComplianceReleasesSbom
      parameters:
        - name: release_key
          in: path
          description: Published release key
          required: true
          schema:
            type: string
      x-swagger-router-ignore: true
      tags:
        - Releases
      responses:
        "200":
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
            Access-Control-Allow-Methods:
              schema:
                type: string
            Access-Control-Allow-Headers:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Empty"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'*'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,x-api-key,x-apikey,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        type: "mock"
        passthroughBehavior: "NEVER"
  /compliance/releases/{release_key}/notice:
    get:
      operationId: getComplianceReleasesNotice
      x-amazon-apigateway-integration:
        type: "http_proxy"
        connectionId: "${stageVariables.vpcLinkId}"
        connectionType: "VPC_LINK"
        httpMethod: "GET"
        uri: "http://${stageVariables.url}/api/v1/releases/{release_key}/notice"
        responses:
          default:
            statusCode: "200"
        requestParameters:
          integration.request.path.release_key: "method.request.path.release_key"
          integration.request.header.version: "'2'"
        passthroughBehavior: "when_no_match"
      tags:
        - Releases
      summary: Get release Notice
      description: Returns the license notice for a published release, including per-license component groupings and cryptographic signatures.
      parameters:
        - name: release_key
          in: path
          description: Published release key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                title: public-Notice
                type: object
                required:
                  - licenses
                  - signatures
                properties:
                  licenses:
                    type: array
                    items:
                      title: License
                      type: object
                      required:
                        - key
                        - components
                      properties:
                        key:
                          type: string
                        name:
                          type: string
                        disclaimer:
                          type: string
                        text:
                          type: string
                        url:
                          type: string
                        editorial:
                          type: string
                        components:
                          type: array
                          items:
                            title: Component
                            type: object
                            properties:
                              name:
                                type: string
                              key:
                                type: string
                              version:
                                type: string
                              changesUrl:
                                type: string
                              changedSourcesUrl:
                                type: string
                              sourcesUrl:
                                type: string
                              copyright:
                                type: string
                              description:
                                type: string
                              urls:
                                type: object
                                description: Component-related URLs
                                properties:
                                  homepage:
                                    type: string
                                  repository:
                                    type: string
                                additionalProperties: true
                  signatures:
                    type: array
                    items:
                      type: object
                      description: Cryptographic signature for content verification
                      additionalProperties: true
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      operationId: optionsComplianceReleasesNotice
      parameters:
        - name: release_key
          in: path
          description: Published release key
          required: true
          schema:
            type: string
      x-swagger-router-ignore: true
      tags:
        - Releases
      responses:
        "200":
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
            Access-Control-Allow-Methods:
              schema:
                type: string
            Access-Control-Allow-Headers:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Empty"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'*'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,x-api-key,x-apikey,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        type: "mock"
        passthroughBehavior: "NEVER"
  /compliance/releases/{release_key}/csaf:
    get:
      operationId: getComplianceReleasesCsaf
      x-amazon-apigateway-integration:
        type: "http_proxy"
        connectionId: "${stageVariables.vpcLinkId}"
        connectionType: "VPC_LINK"
        httpMethod: "GET"
        uri: "http://${stageVariables.url}/api/v1/releases/{release_key}/csaf"
        responses:
          default:
            statusCode: "200"
        requestParameters:
          integration.request.path.release_key: "method.request.path.release_key"
          integration.request.header.version: "'2'"
        passthroughBehavior: "when_no_match"
      tags:
        - Releases
      summary: Get release CSAF/VEX
      description: Returns the CSAF/VEX advisory for a published release, including vulnerability details, product tree, and cryptographic signatures.
      parameters:
        - name: release_key
          in: path
          description: Published release key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                title: public-CSAF_VEX
                type: object
                required:
                  - vulnerabilities
                  - signatures
                properties:
                  document:
                    type: object
                    description: CSAF 2.0 document metadata (see OASIS CSAF standard)
                    additionalProperties: true
                  product_tree:
                    type: object
                    description: CSAF 2.0 document metadata (see OASIS CSAF standard)
                    additionalProperties: true
                  vulnerabilities:
                    type: array
                    items:
                      type: object
                      description: CSAF 2.0 vulnerability entry (see OASIS CSAF standard)
                      additionalProperties: true
                  signatures:
                    type: array
                    items:
                      type: object
                      description: Cryptographic signature for content verification
                      additionalProperties: true
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    options:
      operationId: optionsComplianceReleasesCsaf
      parameters:
        - name: release_key
          in: path
          description: Published release key
          required: true
          schema:
            type: string
      x-swagger-router-ignore: true
      tags:
        - Releases
      responses:
        "200":
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
            Access-Control-Allow-Methods:
              schema:
                type: string
            Access-Control-Allow-Headers:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Empty"
      x-amazon-apigateway-integration:
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Methods: "'*'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,x-api-key,x-apikey,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        requestTemplates:
          application/json: '{"statusCode": 200}'
        type: "mock"
        passthroughBehavior: "NEVER"
