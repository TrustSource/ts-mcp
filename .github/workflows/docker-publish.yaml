name: Docker Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "src/**"
      - "scripts/**"
      - "ts-api/**"
      - "domain-mapping.yaml"
      - "Dockerfile"
      - "package.json"
      - "tsconfig.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-scan:
    name: Build, Scan & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # --- Build the image locally (don't push yet) ---

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: trustsource/mcp-server
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build image (local only)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: trustsource/mcp-server:scan-candidate

      # --- Scan with ts-scan using Syft backend, then upload to TrustSource ---

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Install ts-scan
        run: pip install "ts-scan>=1.7.0"

      - name: Scan Docker image
        run: |
          ts-scan scan \
            --use-syft \
            --tag "${{ github.sha }}" \
            --branch "${{ github.ref_name }}" \
            -o scan-results.json \
            docker:trustsource/mcp-server:scan-candidate

      - name: Upload scan to TrustSource and gate on results
        env:
          TS_API_KEY: ${{ secrets.TRUSTSOURCE_API_KEY }}
        run: |
          ts-scan upload \
            --api-key "$TS_API_KEY" \
            --project-name "ts-mcp" \
            --wait-for-analysis \
            --wait-timeout 300 \
            --exit-on-vulns \
            --exit-on-legal \
            --Werror \
            scan-results.json

      # --- Only push to Docker Hub if scan passed ---

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.FRED4TS2DH }}

      - name: Push image to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
