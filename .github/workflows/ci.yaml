name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Regenerate tools from OpenAPI spec
        run: npm run codegen

      - name: Verify generated code is up to date
        run: |
          git diff --exit-code src/generated-tools.ts || {
            echo "::error::generated-tools.ts is out of date. Run 'npm run codegen' and commit the result."
            exit 1
          }

      - name: Build
        run: npm run build
