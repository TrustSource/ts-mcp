AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ECS Service for TrustSource MCP Server with internal ALB.
  Only accessible from within the VPC via mcp.{env}.trustsource.intern.

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, prd]
    Description: Target environment

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for the ECS tasks and ALB

  ClusterArn:
    Type: String
    Description: ARN of the existing ECS cluster

  AlbSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: >
      Existing internal ALB security group (e.g. alb-int.dev.ts).
      Controls which cluster SGs can reach the ALB.

  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Private hosted zone ID for {env}.trustsource.intern

  DnsName:
    Type: String
    Default: mcp.dev.trustsource.intern
    Description: Internal DNS name for the MCP server

  CertificateArn:
    Type: String
    Default: ''
    Description: ACM certificate ARN for HTTPS. Leave empty for HTTP-only (internal).

  ImageRepository:
    Type: String
    Default: trustsource/ts-mcp
    Description: Docker image repository (Docker Hub)

  ImageTag:
    Type: String
    Default: main
    Description: Docker image tag (main for DEV, prd for PRD)

  TsAccessMode:
    Type: String
    Default: read
    AllowedValues: [read, readwrite, full]
    Description: MCP server access mode

  TsApiBaseUrl:
    Type: String
    Default: https://api.trustsource.io/v2
    Description: TrustSource API base URL

  TaskCpu:
    Type: String
    Default: '256'
    AllowedValues: ['256', '512', '1024']
    Description: CPU units for the task

  TaskMemory:
    Type: String
    Default: '512'
    AllowedValues: ['512', '1024', '2048']
    Description: Memory (MiB) for the task

  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 4
    Description: Number of running tasks

  LogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues: [7, 14, 30, 60, 90]
    Description: CloudWatch log retention in days

Conditions:
  IsDev: !Equals [!Ref Environment, dev]
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]

Resources:

  # ============================================================
  # Internal Application Load Balancer
  # ============================================================

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ts-mcp-${Environment}
      Scheme: internal
      Type: application
      Subnets: !Ref SubnetIds
      SecurityGroups:
        - !Ref AlbSecurityGroupId

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ts-mcp-${Environment}
      Port: 3000
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'

  # HTTPS listener (if certificate provided)
  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # HTTP listener (always created — primary if no cert, redirect target if cert exists)
  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - !If
          - HasCertificate
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref TargetGroup

  # ============================================================
  # Private DNS
  # ============================================================

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DnsName
      Type: A
      AliasTarget:
        DNSName: !GetAtt LoadBalancer.DNSName
        HostedZoneId: !GetAtt LoadBalancer.CanonicalHostedZoneID

  # ============================================================
  # ECS Task & Service
  # ============================================================

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/ts-mcp-${Environment}
      RetentionInDays: !Ref LogRetentionDays

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ts-mcp-${Environment}-exec-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: !Sub ts-mcp-${Environment}-secrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:trustsource/app/api-key*

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ts-mcp-${Environment}-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  # Security group for ECS tasks — only ALB can reach port 3000
  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ts-mcp-${Environment}-task
      GroupDescription: !Sub ts-mcp-${Environment} ECS tasks — accepts traffic only from ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref AlbSecurityGroupId
          Description: MCP HTTP from internal ALB
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS to TrustSource API

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ts-mcp-${Environment}
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: ts-mcp
          Image: !Sub ${ImageRepository}:${ImageTag}
          Essential: true
          Environment:
            - Name: TS_ACCESS_MODE
              Value: !Ref TsAccessMode
            - Name: TS_API_BASE_URL
              Value: !Ref TsApiBaseUrl
            - Name: TS_TRANSPORT
              Value: http
            - Name: TS_HTTP_PORT
              Value: '3000'
            - Name: TS_LOG_LEVEL
              Value: !If
                - IsDev
                - debug
                - info
            - Name: NODE_ENV
              Value: production
          Secrets:
            - Name: TS_API_KEY
              ValueFrom: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:trustsource/app/api-key
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ts-mcp

  Service:
    Type: AWS::ECS::Service
    DependsOn:
      - HttpListener
    Properties:
      ServiceName: !Sub ts-mcp-${Environment}
      Cluster: !Ref ClusterArn
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !Ref TaskSecurityGroup
      LoadBalancers:
        - ContainerName: ts-mcp
          ContainerPort: 3000
          TargetGroupArn: !Ref TargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 200

Outputs:
  McpEndpoint:
    Description: Internal MCP endpoint URL
    Value: !If
      - HasCertificate
      - !Sub https://${DnsName}/mcp
      - !Sub http://${DnsName}/mcp

  HealthEndpoint:
    Description: Health check URL
    Value: !If
      - HasCertificate
      - !Sub https://${DnsName}/health
      - !Sub http://${DnsName}/health

  LoadBalancerDns:
    Description: ALB DNS name
    Value: !GetAtt LoadBalancer.DNSName

  ServiceArn:
    Description: ARN of the ECS service
    Value: !Ref Service

  TaskSecurityGroupId:
    Description: Security group of the MCP server tasks
    Value: !Ref TaskSecurityGroup

  LogGroupName:
    Description: CloudWatch log group
    Value: !Ref LogGroup
